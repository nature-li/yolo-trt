<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: white;">

  <!-- 标题 -->
  <text x="24" y="32" font-size="15" font-weight="500" fill="#2c2c2a">版本性能对比</text>
  <text x="24" y="50" font-size="12" fill="#888">RTX 5060 Ti · TensorRT 10.8 · FP16</text>

  <!-- metric cards -->
  <!-- card 1 -->
  <rect x="24" y="64" width="190" height="64" rx="8" fill="#f1efe8"/>
  <text x="36" y="84" font-size="12" fill="#888">最低延迟</text>
  <text x="36" y="108" font-size="22" font-weight="500" fill="#2c2c2a">1.01ms</text>
  <text x="148" y="108" font-size="12" fill="#888">v4 单次</text>

  <!-- card 2 -->
  <rect x="230" y="64" width="190" height="64" rx="8" fill="#f1efe8"/>
  <text x="242" y="84" font-size="12" fill="#888">最高吞吐</text>
  <text x="242" y="108" font-size="22" font-weight="500" fill="#2c2c2a">1123 QPS</text>
  <text x="374" y="108" font-size="12" fill="#888">v5</text>

  <!-- card 3 -->
  <rect x="436" y="64" width="220" height="64" rx="8" fill="#f1efe8"/>
  <text x="448" y="84" font-size="12" fill="#888">Triton vs 自研</text>
  <text x="448" y="108" font-size="22" font-weight="500" fill="#2c2c2a">10x</text>
  <text x="492" y="108" font-size="12" fill="#888">吞吐差距</text>

  <!-- 表格 header -->
  <rect x="24" y="148" width="632" height="28" rx="0" fill="#f1efe8"/>
  <text x="36"  y="167" font-size="12" font-weight="500" fill="#5f5e5a">版本</text>
  <text x="100" y="167" font-size="12" font-weight="500" fill="#5f5e5a">核心优化</text>
  <text x="370" y="167" font-size="12" font-weight="500" fill="#5f5e5a">均值延迟</text>
  <text x="450" y="167" font-size="12" font-weight="500" fill="#5f5e5a">FPS / QPS</text>
  <text x="540" y="167" font-size="12" font-weight="500" fill="#5f5e5a">p99</text>

  <!-- row 1: v1 -->
  <line x1="24" y1="176" x2="656" y2="176" stroke="#e8e6df" stroke-width="0.5"/>
  <text x="36"  y="194" font-size="12" fill="#2c2c2a">v1</text>
  <text x="100" y="194" font-size="12" fill="#2c2c2a">基础 TRT，CPU preprocess</text>
  <text x="370" y="194" font-size="12" fill="#2c2c2a">4.30ms</text>
  <text x="450" y="194" font-size="12" fill="#2c2c2a">232</text>
  <text x="540" y="194" font-size="12" fill="#2c2c2a">6.21ms</text>

  <!-- row 2: v2 -->
  <line x1="24" y1="204" x2="656" y2="204" stroke="#e8e6df" stroke-width="0.5"/>
  <text x="36"  y="222" font-size="12" fill="#2c2c2a">v2</text>
  <text x="100" y="222" font-size="12" fill="#2c2c2a">CUDA letterbox kernel</text>
  <text x="370" y="222" font-size="12" fill="#2c2c2a">2.87ms</text>
  <text x="450" y="222" font-size="12" fill="#2c2c2a">347</text>
  <text x="540" y="222" font-size="12" fill="#2c2c2a">4.70ms</text>

  <!-- row 3: v3 -->
  <line x1="24" y1="232" x2="656" y2="232" stroke="#e8e6df" stroke-width="0.5"/>
  <text x="36"  y="250" font-size="12" fill="#2c2c2a">v3</text>
  <text x="100" y="250" font-size="12" fill="#2c2c2a">CUDA decode kernel</text>
  <text x="370" y="250" font-size="12" fill="#2c2c2a">2.28ms</text>
  <text x="450" y="250" font-size="12" fill="#2c2c2a">439</text>
  <text x="540" y="250" font-size="12" fill="#2c2c2a">2.35ms</text>

  <!-- row 4: v4 -->
  <line x1="24" y1="260" x2="656" y2="260" stroke="#e8e6df" stroke-width="0.5"/>
  <text x="36"  y="278" font-size="12" fill="#2c2c2a">v4</text>
  <text x="100" y="278" font-size="12" fill="#2c2c2a">cudaStreamAddCallback 全异步</text>
  <text x="370" y="278" font-size="12" fill="#2c2c2a">1.02ms</text>
  <text x="450" y="278" font-size="12" fill="#2c2c2a">976</text>
  <text x="540" y="278" font-size="12" fill="#2c2c2a">1.14ms</text>

  <!-- row 5: v5 highlight -->
  <rect x="24" y="288" width="632" height="32" fill="#e1f5ee"/>
  <line x1="24" y1="288" x2="656" y2="288" stroke="#e8e6df" stroke-width="0.5"/>
  <rect x="32" y="294" width="44" height="18" rx="4" fill="#9fe1cb"/>
  <text x="54"  y="307" font-size="11" font-weight="500" fill="#085041" text-anchor="middle">v5 自研</text>
  <text x="100" y="308" font-size="12" fill="#085041">Drogon + context pool + 多 worker</text>
  <text x="370" y="308" font-size="12" fill="#085041">85ms</text>
  <text x="450" y="308" font-size="12" fill="#085041">1123</text>
  <text x="540" y="308" font-size="12" fill="#085041">-</text>

  <!-- row 6: triton -->
  <line x1="24" y1="320" x2="656" y2="320" stroke="#e8e6df" stroke-width="0.5"/>
  <rect x="32" y="326" width="52" height="18" rx="4" fill="#fac775"/>
  <text x="58"  y="339" font-size="11" font-weight="500" fill="#633806" text-anchor="middle">v6 Triton</text>
  <text x="100" y="340" font-size="12" fill="#2c2c2a">Triton ensemble + Python backend</text>
  <text x="370" y="340" font-size="12" fill="#2c2c2a">141ms</text>
  <text x="450" y="340" font-size="12" fill="#2c2c2a">113</text>
  <text x="540" y="340" font-size="12" fill="#2c2c2a">-</text>
  <line x1="24" y1="352" x2="656" y2="352" stroke="#e8e6df" stroke-width="0.5"/>

  <!-- 条形图标题 -->
  <text x="24" y="378" font-size="12" fill="#888">单次推理延迟（ms，越低越好）</text>

  <!-- bars: max=4.30ms → 500px -->
  <!-- v1: 4.30 → 500px -->
  <rect x="60" y="390" width="500" height="18" rx="3" fill="#B5D4F4"/>
  <text x="44" y="403" font-size="11" fill="#888" text-anchor="end">v1</text>
  <text x="568" y="403" font-size="11" fill="#888">4.30ms</text>

  <!-- v2: 2.87 → 334px -->
  <rect x="60" y="416" width="334" height="18" rx="3" fill="#85B7EB"/>
  <text x="44" y="429" font-size="11" fill="#888" text-anchor="end">v2</text>
  <text x="402" y="429" font-size="11" fill="#888">2.87ms</text>

  <!-- v3: 2.28 → 265px -->
  <rect x="60" y="442" width="265" height="18" rx="3" fill="#378ADD"/>
  <text x="44" y="455" font-size="11" fill="#888" text-anchor="end">v3</text>
  <text x="333" y="455" font-size="11" fill="#888">2.28ms</text>

  <!-- v4: 1.02 → 119px -->
  <rect x="60" y="468" width="119" height="18" rx="3" fill="#185FA5"/>
  <text x="44" y="481" font-size="11" fill="#888" text-anchor="end">v4</text>
  <text x="187" y="481" font-size="11" fill="#888">1.02ms</text>

</svg>
